name: Android Release Build
 
on:
  push:
    branches: [main]
    paths:
      - 'backend/frontend/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal / alpha / beta / production)'
        required: true
        default: 'internal'
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build-android:
    name: Build signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # 2. Node.js 22 — matches SWA workflow
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
 
      # 3. Pin npm to 10.x — matches package.json engine requirement
      - name: Pin npm to 9.x
        run: npm install -g npm@10
 
      # 4. Install — delete lockfile + legacy-peer-deps matches SWA workflow
      # (project has peer dependency conflicts npm ci cannot resolve)
      - name: Install frontend dependencies
        working-directory: backend/frontend
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --registry https://registry.npmjs.org
 
      # 5. Build Vite
      - name: Build Vite frontend
        working-directory: backend/frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AMAZON_CLIENT_ID: ${{ secrets.VITE_AMAZON_CLIENT_ID }}
          VITE_AMAZON_RETURN_URL: ${{ secrets.VITE_AMAZON_RETURN_URL }}
        run: npm run build
 
      # 6. Java 17 for Gradle
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
 
      # 7. Capacitor sync
      - name: Capacitor sync
        working-directory: backend/frontend
        run: npx cap sync android
 
      # 8. Decode keystore
      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > backend/frontend/android/app/adhancast-release.jks
 
      # 9. Gradle permissions
      - name: Make gradlew executable
        working-directory: backend/frontend/android
        run: chmod +x gradlew
 
      # 10. Build signed AAB
      - name: Build release AAB
        working-directory: backend/frontend/android
        env:
          KEYSTORE_PATH: app/adhancast-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
 
      # 11. Upload AAB artifact
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhancast-release-${{ github.run_number }}
          path: backend/frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
 
      # 12. Clean up keystore
      - name: Remove keystore from runner
        if: always()
        run: rm -f backend/frontend/android/app/adhancast-release.jks