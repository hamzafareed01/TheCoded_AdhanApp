# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node app to Azure Web App - app-adhanhome-api-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: app-adhanhome-api-prod
  WORKING_DIRECTORY: backend
  NODE_VERSION: "24.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (backend)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      # If your backend has no build step, skip this.
      # - name: Build (backend)
      #   working-directory: ${{ env.WORKING_DIRECTORY }}
      #   run: npm run build --if-present

      - name: Zip backend for deployment
        run: |
          cd ${{ env.WORKING_DIRECTORY }}
          zip -r ../backend_deploy.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: backend_deploy.zip
