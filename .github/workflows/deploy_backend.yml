name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/index.js"
      - "backend/db/**"
      - "backend/scripts/**"
      - "backend/migrations/**"
      - "backend/data/**"
      - "backend/library/**"
      - "backend/audio/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - ".github/workflows/deploy_backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: app-adhanhome-api-prod
  NODE_VERSION: "24.x"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Stage backend package
        run: |
          rm -rf deploy
          mkdir -p deploy

          cp backend/index.js deploy/
          cp backend/package.json deploy/
          cp backend/package-lock.json deploy/

          cp -R backend/db deploy/db
          cp -R backend/scripts deploy/scripts
          cp -R backend/migrations deploy/migrations
          cp -R backend/data deploy/data
          cp -R backend/library deploy/library
          cp -R backend/audio deploy/audio

      - name: Install production deps in staged package
        run: |
          cd deploy
          npm ci --omit=dev

      - name: Inspect staged package
        run: |
          cd deploy
          find . -maxdepth 3 -type f | sort | grep -E 'package.json|index.js|scripts/|migrations/|db/'

      - name: Create deploy zip
        run: |
          cd deploy
          zip -r ../backend_deploy.zip .

      - name: Inspect deploy zip
        run: unzip -l backend_deploy.zip | grep -E 'package.json|index.js|scripts/|migrations/'

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: backend_deploy.zip