name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/index.js"
      - "backend/db/**"
      - "backend/scripts/**"
      - "backend/migrations/**"
      - "backend/data/**"
      - "backend/library/**"
      - "backend/audio/**"
      - "backend/prisma/**"
      - "backend/prisma.config.ts"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/Dockerfile"
      - ".github/workflows/deploy_backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: app-adhanhome-api-prod
  NODE_VERSION: "24.x"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Stage backend package
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy

          cp backend/index.js deploy/
          cp backend/package.json deploy/
          cp backend/package-lock.json deploy/

          [ -f backend/prisma.config.ts ] && cp backend/prisma.config.ts deploy/ || true
          [ -d backend/db ] && cp -R backend/db deploy/db || true
          [ -d backend/scripts ] && cp -R backend/scripts deploy/scripts || true
          [ -d backend/migrations ] && cp -R backend/migrations deploy/migrations || true
          [ -d backend/data ] && cp -R backend/data deploy/data || true
          [ -d backend/library ] && cp -R backend/library deploy/library || true
          [ -d backend/audio ] && cp -R backend/audio deploy/audio || true
          [ -d backend/prisma ] && cp -R backend/prisma deploy/prisma || true

      - name: Install production dependencies in staged package
        shell: bash
        run: |
          cd deploy
          npm ci --omit=dev --ignore-scripts

      - name: Inspect staged package
        shell: bash
        run: |
          cd deploy
          find . -maxdepth 4 -type f | sort | grep -E 'package.json|package-lock.json|index.js|scripts/|migrations/|db/|prisma/|data/|library/|audio/' || true

      - name: Create deploy zip
        shell: bash
        run: |
          cd deploy
          zip -r ../backend_deploy.zip .

      - name: Inspect deploy zip
        shell: bash
        run: |
          unzip -l backend_deploy.zip | grep -E 'package.json|package-lock.json|index.js|scripts/|migrations/|db/|prisma/|data/|library/|audio/' || true

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: backend_deploy.zip
