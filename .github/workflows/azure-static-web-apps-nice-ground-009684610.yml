name: Azure Static Web Apps CI/CD
 
on:
  push:
    branches:
      - main
    paths:
      - "backend/frontend/**"
      - ".github/workflows/azure-static-web-apps-nice-ground-009684610.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "backend/frontend/**"
      - ".github/workflows/azure-static-web-apps-nice-ground-009684610.yml"
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
 
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
 
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
 
      - name: Pin npm to 9.x
        run: npm install -g npm@9
 
      - name: Delete lockfile and reinstall from public registry
        working-directory: backend/frontend
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --registry https://registry.npmjs.org
 
      - name: Build frontend
        working-directory: backend/frontend
        env:
          VITE_AMAZON_CLIENT_ID: ${{ secrets.VITE_AMAZON_CLIENT_ID }}
          VITE_AMAZON_RETURN_URL: ${{ secrets.VITE_AMAZON_RETURN_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build
 
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_GROUND_009684610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "backend/frontend/build"
          api_location: ""
          output_location: ""
          skip_app_build: true
 
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_GROUND_009684610 }}
          action: "close"
          app_location: "backend/frontend/build"